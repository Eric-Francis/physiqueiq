<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PhysiqueIQ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050000;
font-family:Arial, Helvetica, sans-serif;
color:white;
overflow-x:hidden;
}

.navbar{
height:80px;
border-bottom:1px solid rgba(255,255,255,.08);

display:flex;
align-items:center;
justify-content:space-between;

padding:0 80px;
}

.logo{
font-size:34px;
font-weight:800;
color:#ff2d3d;
}

.menu{
display:flex;
gap:60px;
}

.menu a{
text-decoration:none;
color:#9b8e8e;
font-size:20px;
}

.menu a:hover{
color:white;
}

.right{
display:flex;
gap:25px;
align-items:center;
}

.login{
color:white;
text-decoration:none;
font-weight:600;
}

.start{
background:#ff2d3d;
border:none;
padding:15px 28px;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
}

.hero{
padding-left:140px;
padding-top:90px;
}

.badge{
display:inline-block;
padding:10px 22px;
border:1px solid #6e0000;
border-radius:50px;
color:#ff2d3d;
font-size:18px;
letter-spacing:2px;
margin-bottom:35px;
}

.hero h1{
font-size:110px;
line-height:.9;
font-weight:900;
}

.white{
color:#ece8e8;
}

.red{
color:#ff2d3d;
}

.subtitle{
margin-top:35px;
font-size:26px;
color:#9f9494;
max-width:900px;
line-height:1.5;
}

.buttons{
margin-top:50px;
display:flex;
gap:20px;
}

.btn-red{
background:#ff2d3d;
color:white;
border:none;
padding:20px 40px;
border-radius:12px;
font-size:24px;
cursor:pointer;
}

.btn-dark{
background:transparent;
border:1px solid rgba(255,255,255,.1);
color:white;
padding:20px 40px;
border-radius:12px;
font-size:24px;
cursor:pointer;
}

@media(max-width:1000px){

.hero h1{
font-size:70px;
}

.navbar{
padding:20px;
}

.menu{
display:none;
}

.hero{
padding:40px;
}

}

</style>
</head>

<body>

<nav class="navbar">

<div class="logo">
PHYSIQUEIQ
</div>

<div class="menu">
<a href="#">Features</a>
<a href="#">How it works</a>
<a href="#">Pricing</a>
</div>

<div class="right">
<a href="#" class="login">Log in</a>
<button class="start">Get started</button>
</div>

</nav>

<section class="hero">

<div class="badge">
● AI-POWERED COACHING
</div>

<h1 class="white">
TRAIN SHARPER.
</h1>

<h1 class="red">
BUILD THE<br>
PHYSIQUE.
</h1>

<p class="subtitle">
PhysiqueIQ is your 24/7 AI coach for training and nutrition
—from fat loss to stage-ready prep. Built by athletes.
Powered by data.
</p>

<div class="buttons">

<button class="btn-red">
Start free
</button>

<button class="btn-dark">
I have an account
</button>

</div>

</section>

</body>
</html>
